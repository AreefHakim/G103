<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU EXCHANGE - Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body {
            background-color: #f8fafc; /* Slate 50 (Cerah, bersih & premium) */
            height: 100vh;
            display: flex;
            align-items: center;
            color: #0f172a; /* Slate 900 */
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Kesan pencahayaan lembut versi Light Mode menggunakan warna biru MMU */
        .glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 350px;
            background: radial-gradient(circle, rgba(0, 114, 206, 0.08) 0%, rgba(248, 250, 252, 0) 70%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* Rekabentuk tajuk utama yang berimpak tinggi */
        .mmu-title {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 1.2rem;
            line-height: 1.1;
        }
        
        .mmu-blue {
            color: #0072ce; /* Biru Rasmi MMU */
        }
        
        .mmu-red {
            color: #dc3545; /* Merah Rasmi MMU */
        }
        
        .text-gradient-dark {
            background: linear-gradient(180deg, #0f172a 0%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            color: #475569; /* Slate 600 */
            font-size: 1.25rem;
            max-width: 650px;
            margin: 0 auto 3rem auto;
            line-height: 1.7;
            font-weight: 500;
        }

        /* Butang Utama Premium (Solid Blue) */
        .btn-linear {
            background: linear-gradient(135deg, #0072ce, #00569e);
            color: #ffffff;
            padding: 14px 38px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 114, 206, 0.15);
        }

        .btn-linear:hover {
            background: linear-gradient(135deg, #0082ea, #0061b2);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 114, 206, 0.25);
        }

        /* Butang Kedua Premium (Outline Slate) */
        .btn-outline-linear {
            color: #475569;
            padding: 14px 38px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid #cbd5e1;
            margin-left: 12px;
            background-color: #ffffff;
        }

        .btn-outline-linear:hover {
            border-color: #dc3545; /* Hover bertukar ke warna Merah MMU */
            color: #dc3545;
            background-color: rgba(220, 53, 69, 0.03);
            transform: translateY(-1px);
        }

        /* Lencana MMU Business Week */
        .badge-new {
            background: rgba(0, 114, 206, 0.06);
            color: #0072ce;
            border: 1px solid rgba(0, 114, 206, 0.12);
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Responsif untuk paparan peranti mudah alih */
        @media (max-width: 768px) {
            .mmu-title {
                font-size: 3.2rem;
                letter-spacing: -1px;
            }
            .sub-text {
                font-size: 1.1rem;
            }
            .d-flex {
                flex-direction: column;
                gap: 12px;
                align-items: center;
            }
            .btn-outline-linear {
                margin-left: 0;
                width: 100%;
                max-width: 250px;
            }
            .btn-linear {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="badge-new">MMU Business Week 2026</div>
                
                <h1 class="mmu-title">
                    <span class="mmu-blue">M</span><span class="mmu-blue">M</span><span class="mmu-red">U</span> <span class="text-gradient-dark">Exchange</span>
                </h1>
                
                <p class="sub-text">
                    The streamlined system for vendor registration, event management, and digital store engagement. Purpose-built for the next generation of entrepreneurs.
                </p>
                
                <div class="d-flex justify-content-center align-items-center">
                    <a href="{{ url_for('login') }}" class="btn-linear">Get Started</a>
                    <a href="{{ url_for('register') }}" class="btn-outline-linear">Create Account</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
