<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0b0b0f; 
            min-height: 100vh; 
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
        }

        .glow {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 500px;
            background: radial-gradient(circle, rgba(94, 59, 238, 0.15) 0%, rgba(11, 11, 15, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .welcome-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #2e2e32;
            border-radius: 24px;
            padding: 60px 40px;
            backdrop-filter: blur(10px);
            z-index: 1;
            position: relative;
        }

        h1 {
            font-weight: 800;
            font-size: 3.5rem;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #ffffff 0%, #a2a2a2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-custom-primary {
            background: #ffffff;
            color: #000000;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px 30px;
            transition: 0.2s;
        }

        .btn-custom-primary:hover {
            background: #e2e2e2;
            color: #000000;
            transform: translateY(-2px);
        }

        .btn-custom-secondary {
            border: 1px solid #2e2e32;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px 30px;
            transition: 0.2s;
        }

        .btn-custom-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <div class="welcome-box">
                    <span class="text-uppercase tracking-wider small fw-bold text-muted mb-2 d-block" style="color: #5e3bee !important; letter-spacing: 2px;">Welcome to Student Commerce</span>
                    <h1 class="mb-3">MMU EXCHANGE</h1>
                    <p class="lead text-muted mb-5" style="color: rgba(255,255,255,0.6) !important;">The ultimate student marketplace. Buy, sell, rate stores, and discover community events happening right on campus.</p>
                    
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{{ url_for('login') }}" class="btn btn-custom-primary px-4">Sign In</a>
                        <a href="{{ url_for('register') }}" class="btn btn-custom-secondary px-4">Create Account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
