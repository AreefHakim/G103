<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Project System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #007bff 0%, #00d4ff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            color: white;
        }
        .home-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-8 home-box">
                <h1 class="display-3 fw-bold mb-3">Project Authentication</h1>
                <p class="lead mb-5">Selamat datang ke sistem kami. Sila log masuk atau daftar akaun baharu untuk bermula.</p>
                
                <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                    <!-- Pastikan URL ini sepadan dengan routing dalam app.py kawan awak -->
                    <a href="{{ url_for('login') }}" class="btn btn-light btn-lg px-5 fw-bold text-primary">Login</a>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-light btn-lg px-5">Register</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
