<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU EXCHANGE - Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Warna hitam pekat ala Linear */
            background-color: #0b0b0f;
            height: 100vh;
            display: flex;
            align-items: center;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Kesan cahaya lembut di belakang (Subtle Glow) */
        .glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(circle, rgba(94, 59, 238, 0.15) 0%, rgba(11, 11, 15, 0) 70%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .mmu-title {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #ffffff 0%, #a2a2a2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .sub-text {
            color: #8a8f98;
            font-size: 1.25rem;
            max-width: 600px;
            margin: 0 auto 3rem auto;
            line-height: 1.6;
        }

        .btn-linear {
            background-color: #ffffff;
            color: #000000;
            padding: 12px 35px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid #ffffff;
        }

        .btn-linear:hover {
            background-color: transparent;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .btn-outline-linear {
            color: #8a8f98;
            padding: 12px 35px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid #2e2e32;
            margin-left: 10px;
        }

        .btn-outline-linear:hover {
            border-color: #5e3bee;
            color: #ffffff;
            background-color: rgba(94, 59, 238, 0.05);
        }

        /* Garisan kecil bawah tajuk ala Linear */
        .badge-new {
            background: rgba(94, 59, 238, 0.1);
            color: #5e3bee;
            border: 1px solid rgba(94, 59, 238, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="badge-new">MMU Business Week 2026</div>
                
                <h1 class="mmu-title">MMU Exchange</h1>
                
                <p class="sub-text">
                    The streamlined system for vendor registration, event management, and digital store engagement. Purpose-built for the next generation of entrepreneurs.
                </p>
                
                <div class="d-flex justify-content-center">
                    <a href="{{ url_for('login') }}" class="btn-linear">Get Started</a>
                    <a href="{{ url_for('register') }}" class="btn-outline-linear">Create Account</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
