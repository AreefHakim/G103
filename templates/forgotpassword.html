<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0b0b0f; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .reset-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #2e2e32;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h2 { font-weight: 800; letter-spacing: -1px; }
        .form-label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.6); }
        
        .form-control {
            background-color: #1a1a1e !important;
            border: 1px solid #3e3e42 !important;
            color: white !important;
            border-radius: 10px;
            padding: 12px;
        }

        /* --- FIX PLACEHOLDER --- */
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5) !important;
            opacity: 1;
        }
        .form-control::-webkit-input-placeholder {
            color: rgba(255, 255, 255, 0.5) !important;
        }

        .btn-reset {
            background: white;
            color: black;
            font-weight: 700;
            border-radius: 10px;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-reset:hover { background: #e2e2e2; transform: translateY(-2px); }
        
        .back-link { 
            color: rgba(255,255,255,0.5); 
            text-decoration: none; 
            font-size: 0.9rem; 
            transition: 0.2s;
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="reset-card">
                    <div class="text-center mb-4">
                        <h2>MMU EXCHANGE</h2>
                        <p class="text-white-50">Reset Password</p>
                        <p class="small text-white-50">Enter your email and we'll send a reset link.</p>
                    </div>

                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@email.com" required>
                        </div>

                        <button type="submit" class="btn btn-reset">Send Reset Link</button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{{ url_for('login') }}" class="back-link">← Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
