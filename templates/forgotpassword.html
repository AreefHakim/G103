<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container bg-white p-5 rounded shadow" style="max-width: 500px;">
        <h3 class="text-center">Forgot Password?</h3>
        <p class="text-muted text-center">Enter your email to reset your password.</p>
        <input type="email" class="form-control mb-3" placeholder="yourname@mmu.edu.my">
        <button class="btn btn-warning w-100">Send Reset Link</button>
        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="text-decoration-none">Back to Login</a>
        </div>
    </div>
</body>
</html>
