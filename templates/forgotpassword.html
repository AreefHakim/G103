<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 400px;">
        <h4 class="text-center">Reset Password</h4>
        <p class="text-muted small text-center">Enter your email address and we'll send you a link to reset your password.</p>
        <input type="email" class="form-control mb-3" placeholder="Email address">
        <button class="btn btn-primary w-100">Send Link</button>
        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="small text-decoration-none">Back to Login</a>
        </div>
    </div>
</body>
</html>
