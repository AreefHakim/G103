<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body { 
            background-color: #f8fafc; /* Slate 50 (Cerah dan bersih) */
            color: #0f172a; /* Slate 900 */
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .reset-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 114, 206, 0.04);
        }
        
        /* 🌟 GAYA LOGO DUA WARNA BRANDING MMU EXCHANGE */
        .logo-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 1.85rem;
            letter-spacing: -0.03em;
            margin: 0;
        }

        .brand-mmu {
            color: #0072ce; /* Biru MMU */
        }

        .brand-u {
            color: #e4002b; /* Merah U */
        }

        .brand-exchange {
            color: #334155; /* Kelabu Gelap Exchange */
            font-weight: 700;
        }
        
        .form-label { 
            font-size: 0.8rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: #475569; /* Slate 600 */
            letter-spacing: 0.5px;
        }
        
        .form-control {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #0f172a !important;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: #94a3b8 !important;
            opacity: 1;
        }

        .form-control:focus {
            background-color: #ffffff !important;
            border-color: #0072ce !important; /* Biru MMU */
            box-shadow: 0 0 0 0.25rem rgba(0, 114, 206, 0.12);
            color: #0f172a !important;
        }

        /* Butang Reset Premium Siri Biru MMU */
        .btn-reset {
            background: linear-gradient(135deg, #0072ce, #00569e);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 114, 206, 0.15);
        }

        .btn-reset:hover { 
            background: linear-gradient(135deg, #0082ea, #0061b2);
            color: white;
            transform: translateY(-1px); 
            box-shadow: 0 6px 20px rgba(0, 114, 206, 0.25);
        }
        
        .back-link { 
            color: #64748b; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .back-link:hover { 
            color: #0072ce; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="reset-card">
                    <div class="text-center mb-4">
                        <h2 class="logo-text mb-2">
                            <span class="brand-mmu">MM</span><span class="brand-u">U</span> <span class="brand-exchange">Exchange</span>
                        </h2>
                        <p class="text-muted fw-semibold mb-1" style="font-size: 0.95rem;">Reset Password</p>
                        <p class="small text-muted mb-0">Enter your email and we'll send a reset link.</p>
                    </div>

                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@email.com" required>
                        </div>

                        <button type="submit" class="btn btn-reset">Send Reset Link</button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{{ url_for('login') }}" class="back-link">← Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
