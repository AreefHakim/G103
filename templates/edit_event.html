<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    
    <style>
        body { 
            background-color: #0b0b0f; 
            min-height: 100vh; 
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
        }
        .edit-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid #2e2e32;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            margin-top: 80px;
        }
        .form-control {
            background-color: #121217 !important;
            border: 1px solid #2e2e32 !important;
            color: white !important;
            border-radius: 10px;
            padding: 12px;
        }
        .form-control:focus {
            border-color: #a288ff !important;
            box-shadow: 0 0 10px rgba(162, 136, 255, 0.2) !important;
        }
        /* Ubah warna latar belakang popup Flatpickr supaya matching dengan tema web */
        .flatpickr-calendar {
            background: #121217 !important;
            border: 1px solid #2e2e32 !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5) !important;
        }
        .btn-save {
            background-color: #a288ff;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 12px;
            border: none;
            transition: 0.3s;
        }
        .btn-save:hover {
            background-color: #8a6be3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card edit-card p-4">
                    <h3 class="mb-4 fw-bold" style="color: #a288ff;">📝 Edit Event Reminder</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label small text-white-50">Event Title</label>
                            <input type="text" name="title" class="form-control" value="{{ event.title }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-white-50">Description</label>
                            <textarea name="description" class="form-control" rows="3" required>{{ event.description }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-white-50">Event Date (Select Range)</label>
                            <input type="text" id="range-date-picker" name="date" class="form-control" placeholder="Choose dates..." required>
                            <div class="form-text text-white-50 small mt-1">Current format in database: <strong>{{ event.date }}</strong></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-white-50">Location</label>
                            <input type="text" name="location" class="form-control" value="{{ event.location }}" required>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-save">Save Changes</button>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary text-white border-secondary" style="border-radius: 10px;">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Ambil tarikh lama dari backend Jinja2
            const currentDateValue = "{{ current_date_value }}";
            
            // Periksa jika tarikh mengandungi range (contoh: "29-31 May 2026")
            let defaultDates = [];
            if (currentDateValue) {
                defaultDates = [currentDateValue];
            }

            flatpickr("#range-date-picker", {
                mode: "range",          // 👈 Membolehkan pilihan banyak hari (Range)
                dateFormat: "Y-m-d",    // Format dihantar ke backend: YYYY-MM-DD
                defaultDate: defaultDates, // Set tarikh sedia ada dari DB
                locale: {
                    firstDayOfWeek: 0   // Mula dari hari Ahad
                }
            });
        });
    </script>
</body>
</html>
