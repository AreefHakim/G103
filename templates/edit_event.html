<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Flatpickr Core (Default Light Theme) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body { 
            background-color: #f8fafc; /* Slate 50 (Cerah dan bersih) */
            min-height: 100vh; 
            color: #0f172a; /* Slate 900 */
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            display: flex;
            align-items: center;
        }
        
        .edit-card {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 15px 35px rgba(0, 114, 206, 0.04);
            transition: all 0.3s ease;
        }
        
        .edit-card:focus-within {
            box-shadow: 0 20px 40px rgba(0, 114, 206, 0.06);
        }

        h3 {
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #0f172a;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #475569; /* Slate 600 */
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #0f172a !important;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background-color: #ffffff !important;
            border-color: #0072ce !important; /* Biru MMU */
            box-shadow: 0 0 0 4px rgba(0, 114, 206, 0.12) !important;
            outline: none;
        }

        .form-text {
            color: #64748b !important; /* Slate 500 */
            font-weight: 500;
        }

        /* Penyesuaian Kalendar Flatpickr Cerah */
        .flatpickr-calendar {
            background: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
            box-shadow: 0 10px 25px rgba(0, 114, 206, 0.08) !important;
            border-radius: 12px !important;
        }

        .flatpickr-day.selected, 
        .flatpickr-day.startRange, 
        .flatpickr-day.endRange, 
        .flatpickr-day.selected.inRange, 
        .flatpickr-day.startRange.inRange, 
        .flatpickr-day.endRange.inRange, 
        .flatpickr-day.selected:focus, 
        .flatpickr-day.startRange:focus, 
        .flatpickr-day.endRange:focus, 
        .flatpickr-day.selected:hover, 
        .flatpickr-day.startRange:hover, 
        .flatpickr-day.endRange:hover {
            background: #0072ce !important;
            border-color: #0072ce !important;
        }

        .flatpickr-day.inRange {
            background: rgba(0, 114, 206, 0.08) !important;
            border-color: transparent !important;
            box-shadow: -5px 0 0 rgba(0, 114, 206, 0.08), 5px 0 0 rgba(0, 114, 206, 0.08) !important;
        }

        /* Butang Simpan Premium dengan Gradien Biru MMU */
        .btn-save {
            background: linear-gradient(135deg, #0072ce, #00569e);
            color: white !important;
            font-weight: 700;
            border-radius: 12px;
            padding: 14px;
            border: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 114, 206, 0.15);
        }

        .btn-save:hover {
            background: linear-gradient(135deg, #0082ea, #0061b2);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 114, 206, 0.25);
        }

        .btn-cancel {
            background-color: transparent;
            color: #64748b;
            border: 1px solid #cbd5e1;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px;
            transition: all 0.2s ease;
            text-decoration: none;
            text-center: center;
        }

        .btn-cancel:hover {
            background-color: #f1f5f9;
            color: #dc3545;
            border-color: #f1f5f9;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card edit-card p-4 p-md-5">
                    <h3 class="mb-4 fw-bold">📝 Edit Event Reminder</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Event Title</label>
                            <input type="text" name="title" class="form-control" value="{{ event.title }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3" required>{{ event.description }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Event Date (Select Range)</label>
                            <input type="text" id="range-date-picker" name="date" class="form-control" placeholder="Choose dates..." required>
                            <div class="form-text small mt-2">Current format in database: <strong>{{ event.date }}</strong></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control" value="{{ event.location }}" required>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-save">Save Changes</button>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-cancel text-center">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Ambil tarikh lama dari backend Jinja2
            const currentDateValue = "{{ current_date_value }}";
            
            // Periksa jika tarikh mengandungi range (contoh: "29-31 May 2026")
            let defaultDates = [];
            if (currentDateValue) {
                defaultDates = [currentDateValue];
            }

            flatpickr("#range-date-picker", {
                mode: "range",          // 👈 Membolehkan pilihan banyak hari (Range)
                dateFormat: "Y-m-d",    // Format dihantar ke backend: YYYY-MM-DD
                defaultDate: defaultDates, // Set tarikh sedia ada dari DB
                locale: {
                    firstDayOfWeek: 0   // Mula dari hari Ahad
                }
            });
        });
    </script>
</body>
</html>
