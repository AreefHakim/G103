<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .register-card { max-width: 400px; width: 100%; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2 class="text-center mb-4">Register Page</h2>
        <form method="POST" action="">
            {{ form.hidden_tag() }}
            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username(class="form-control", placeholder="Create username") }}
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                {{ form.password(class="form-control", placeholder="Create password") }}
            </div>
            <div class="d-grid gap-2">
                {{ form.submit(class="btn btn-success") }}
            </div>
        </form>
        <div class="text-center mt-3">
            <small>Already have an account? <a href="{{ url_for('login') }}">Login</a></small>
        </div>
    </div>
</body>
</html>
