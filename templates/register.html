<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body { 
            background-color: #f8fafc; /* Slate 50 (Cerah dan bersih) */
            color: #0f172a; /* Slate 900 */
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .register-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 114, 206, 0.04);
        }
        
        h2 { 
            font-weight: 800; 
            letter-spacing: -1px; 
            color: #0f172a;
        }
        
        .form-label { 
            font-size: 0.8rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: #475569; /* Slate 600 */
            letter-spacing: 0.5px;
        }
        
        .form-control {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #0f172a !important;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: #94a3b8 !important;
            opacity: 1;
        }

        .form-control:focus {
            background-color: #ffffff !important;
            border-color: #0072ce !important; /* Biru MMU */
            box-shadow: 0 0 0 0.25rem rgba(0, 114, 206, 0.12);
            color: #0f172a !important;
        }

        /* Butang Register Premium Siri Biru MMU */
        .btn-register {
            background: linear-gradient(135deg, #0072ce, #00569e);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 114, 206, 0.15);
        }

        .btn-register:hover { 
            background: linear-gradient(135deg, #0082ea, #0061b2);
            color: white;
            transform: translateY(-1px); 
            box-shadow: 0 6px 20px rgba(0, 114, 206, 0.25);
        }
        
        .footer-link { 
            color: #64748b; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 500;
        }
        
        .login-link {
            color: #0072ce;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid rgba(0, 114, 206, 0.2);
            padding-bottom: 2px;
            transition: all 0.2s ease;
        }
        
        .login-link:hover { 
            color: #00569e;
            border-bottom-color: #00569e;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="register-card">
                    <div class="text-center mb-4">
                        <h2>MMU EXCHANGE</h2>
                        <p class="text-muted small">Create your account</p>
                    </div>

                    <form method="POST" action="">
                        {{ form.hidden_tag() }}
                        
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            {{ form.username(class="form-control", placeholder="Choose a username") }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            {{ form.password(class="form-control", placeholder="Create a password") }}
                        </div>

                        {{ form.submit(class="btn btn-register") }}
                    </form>

                    <div class="text-center mt-4">
                        <p class="footer-link mb-0">Already have an account? 
                            <a href="{{ url_for('login') }}" class="login-link">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
