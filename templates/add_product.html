<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0b0b0f; 
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-y: auto; /* Forces vertical scrollbar to be active */
            padding-bottom: 60px;
        }

        .glow {
            position: fixed;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 1000px; height: 400px;
            background: radial-gradient(circle, rgba(94, 59, 238, 0.08) 0%, rgba(11, 11, 15, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .navbar {
            background: rgba(11, 11, 15, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2e2e32;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid #2e2e32;
            border-radius: 24px;
            padding: 40px;
            margin-top: 50px;
            margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .form-control, .form-select {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid #3a3a40 !important;
            color: #ffffff !important;
            border-radius: 12px;
            padding: 12px;
        }

        /* Brightens input placeholder text for high contrast */
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.35) !important;
        }

        .form-control:focus, .form-select:focus {
            border-color: #5e3bee !important;
            box-shadow: 0 0 10px rgba(94, 59, 238, 0.3) !important;
        }

        /* Styles fallback dropdown selections for readability over dark background */
        .form-select option {
            background-color: #14141c;
            color: white;
        }

        .btn-submit {
            background-color: #ffffff;
            color: #000000;
            font-weight: 700;
            border-radius: 12px;
            padding: 14px;
            border: none;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #e2e2e2;
            transform: translateY(-2px);
        }

        .custom-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">MMU EXCHANGE</a>
            <a class="btn btn-outline-light btn-sm px-3" href="{{ url_for('my_store') }}">Cancel</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="form-container">
                    <h2 class="text-center fw-bold mb-4" style="background: linear-gradient(180deg, #ffffff 0%, #a2a2a2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Add New Product</h2>
                    
                    <form action="{{ url_for('add_product') }}" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label custom-label">Product Name</label>
                            <input type="text" name="name" class="form-control" placeholder="e.g., Mechanical Keyboard" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label custom-label">Price (RM)</label>
                            <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label custom-label">Category</label>
                            <select name="category_select" id="category_select" class="form-select" onchange="toggleOtherCategory()" required>
                                <option value="Electronics">Electronics</option>
                                <option value="Books">Books</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Others">Others (Type your own)</option>
                            </select>
                        </div>

                        <div class="mb-3 d-none" id="other_category_div">
                            <label class="form-label custom-label">Specify Other Category</label>
                            <input type="text" name="other_category" id="other_category" class="form-control" placeholder="Type your category here">
                        </div>

                        <div class="mb-4">
                            <label class="form-label custom-label">Product Image URL</label>
                            <input type="url" name="image_url" class="form-control" placeholder="https://example.com/image.jpg" required>
                        </div>

                        <button type="submit" class="btn btn-submit w-100">List Product</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleOtherCategory() {
            var select = document.getElementById('category_select');
            var otherDiv = document.getElementById('other_category_div');
            var otherInput = document.getElementById('other_category');
            
            if (select.value === 'Others') {
                otherDiv.classList.remove('d-none');
                otherInput.setAttribute('required', 'required');
            } else {
                otherDiv.classList.add('d-none');
                otherInput.removeAttribute('required');
            }
        }
    </script>
</body>
</html>
