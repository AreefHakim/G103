<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Store - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0b0b0f; 
            color: white; 
            font-family: 'Inter', sans-serif; 
        }
        .store-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #2e2e32;
            border-radius: 24px;
            padding: 40px;
            margin-top: 50px;
            position: relative;
        }
        h2 { color: #ffffff; font-weight: 800; }
        p.description { color: rgba(255, 255, 255, 0.7); font-size: 1.2rem; }
        .label-text { color: #5e3bee; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .danger-zone {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="store-card text-center">
                    <span class="label-text">Official Store</span>
                    <h2 class="display-5 mt-2 mb-4">{{ store.name }}</h2>
                    <p class="description mb-5">{{ store.description }}</p>
                    <div class="mb-4">
    <form method="POST"
          action="{{ url_for('rate_store', store_id=store.id) }}"
          class="d-flex justify-content-center align-items-center gap-2">

        <select name="rating" class="form-select form-select-sm w-auto">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>

        <button type="submit"
                class="btn btn-sm btn-warning fw-bold">
            Rate Store
        </button>
    </form>
</div>
                        
    <form method="POST"
          action="{{ url_for('rate_store', store_id=store.id) }}"
          class="d-flex justify-content-center align-items-center gap-2">

        <select name="rating" class="form-select form-select-sm w-auto">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>

        <button type="submit"
                class="btn btn-sm btn-warning fw-bold">
            Rate Store
        </button>
    </form>
</div>
                    
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mb-5">
                        <a href="{{ url_for('add_product') }}" class="btn btn-primary px-4 fw-bold" style="background: white; color: black; border: none; border-radius: 10px;">
                            + Add Product
                        </a>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light px-4" style="border-radius: 10px;">
                            Back to Dashboard
                        </a>
                    </div>

                    <div class="danger-zone">
                        <p class="text-danger small mb-2" style="font-weight: 600; opacity: 0.8;">DANGER ZONE</p>
                        <form action="{{ url_for('delete_store') }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this store? All of your listed products will be permanently lost!');">
                            <button type="submit" class="btn btn-outline-danger btn-sm px-3" style="border-radius: 8px; font-size: 0.8rem;">
                                🗑️ Delete My Store Permanently
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
