<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Event - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    
    <style>
        body { 
            background-color: #0b0b0f; 
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .form-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid #2e2e32;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .form-control {
            background-color: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid #2e2e32 !important;
            color: white !important;
            border-radius: 10px;
            padding: 12px;
        }
        .form-control:focus {
            border-color: #a288ff !important;
            box-shadow: 0 0 10px rgba(162, 136, 255, 0.2) !important;
        }
        /* Ubah warna latar belakang popup Flatpickr supaya matching dengan tema web */
        .flatpickr-calendar {
            background: #121217 !important;
            border: 1px solid #2e2e32 !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5) !important;
        }
        .btn-save {
            background-color: #ffffff;
            color: #000000;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px;
            border: none;
            transition: 0.3s;
        }
        .btn-save:hover {
            background-color: #e2e2e2;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card form-card p-4 p-md-5">
                    <h2 class="fw-bold mb-4 text-center" style="background: linear-gradient(180deg, #ffffff 0%, #a2a2a2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">➕ Add New Event</h2>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label text-white-50 small fw-bold">Event Title</label>
                            <input type="text" name="title" class="form-control" required placeholder="e.g., Pitching Competition">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white-50 small fw-bold">Description</label>
                            <textarea name="description" class="form-control" rows="3" required placeholder="Write a catchy details..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white-50 small fw-bold">Event Date (Select Range)</label>
                            <input type="text" id="add-date-picker" name="date" class="form-control" placeholder="Select date or date range..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white-50 small fw-bold">Location</label>
                            <input type="text" name="location" class="form-control" required placeholder="e.g., FCI Square">
                        </div>
                        <button type="submit" class="btn btn-save w-100 mt-3">Publish Event</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-link w-100 text-center mt-2 text-white-50 text-decoration-none small">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            flatpickr("#add-date-picker", {
                mode: "range",          // 👈 Membolehkan pilihan julat tarikh (banyak hari)
                dateFormat: "Y-m-d",    // Format hantar ke backend python: YYYY-MM-DD
                locale: {
                    firstDayOfWeek: 0   // Kalendar mula dari hari Ahad
                }
            });
        });
    </script>
</body>
</html>
