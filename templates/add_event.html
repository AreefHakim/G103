<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Event - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Flatpickr Core & Default Light Theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body { 
            background-color: #f8fafc; /* Slate 50 (Cerah dan bersih) */
            color: #0f172a; /* Slate 900 */
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .form-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 114, 206, 0.04);
            transition: all 0.3s ease;
        }

        .form-card:focus-within {
            box-shadow: 0 20px 40px rgba(0, 114, 206, 0.06);
        }

        h2 {
            font-weight: 800;
            letter-spacing: -1px;
            color: #0f172a;
        }
        
        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #475569; /* Slate 600 */
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #0f172a !important;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control::placeholder {
            color: #94a3b8 !important;
            opacity: 1;
        }

        .form-control:focus {
            background-color: #ffffff !important;
            border-color: #0072ce !important; /* Biru MMU */
            box-shadow: 0 0 0 4px rgba(0, 114, 206, 0.12) !important;
            outline: none;
        }

        /* Penyesuaian Kalendar Flatpickr Cerah */
        .flatpickr-calendar {
            background: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
            box-shadow: 0 10px 25px rgba(0, 114, 206, 0.08) !important;
            border-radius: 12px !important;
        }

        .flatpickr-day.selected, 
        .flatpickr-day.startRange, 
        .flatpickr-day.endRange, 
        .flatpickr-day.selected.inRange, 
        .flatpickr-day.startRange.inRange, 
        .flatpickr-day.endRange.inRange, 
        .flatpickr-day.selected:focus, 
        .flatpickr-day.startRange:focus, 
        .flatpickr-day.endRange:focus, 
        .flatpickr-day.selected:hover, 
        .flatpickr-day.startRange:hover, 
        .flatpickr-day.endRange:hover {
            background: #0072ce !important;
            border-color: #0072ce !important;
        }

        .flatpickr-day.inRange {
            background: rgba(0, 114, 206, 0.08) !important;
            border-color: transparent !important;
            box-shadow: -5px 0 0 rgba(0, 114, 206, 0.08), 5px 0 0 rgba(0, 114, 206, 0.08) !important;
        }

        /* Butang Publish Premium */
        .btn-save {
            background: linear-gradient(135deg, #0072ce, #00569e);
            color: white !important;
            font-weight: 700;
            border-radius: 12px;
            padding: 14px;
            border: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 114, 206, 0.15);
        }

        .btn-save:hover {
            background: linear-gradient(135deg, #0082ea, #0061b2);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 114, 206, 0.25);
        }

        .btn-cancel {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            color: #dc3545; /* Tukar merah bila hover untuk 'Cancel' */
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card form-card p-4 p-md-5">
                    <h2 class="fw-bold mb-4 text-center">➕ Add New Event</h2>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Event Title</label>
                            <input type="text" name="title" class="form-control" required placeholder="e.g., Pitching Competition">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3" required placeholder="Write catchy details..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Event Date (Select Range)</label>
                            <input type="text" id="add-date-picker" name="date" class="form-control" placeholder="Select date or date range..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control" required placeholder="e.g., FCI Square">
                        </div>
                        <button type="submit" class="btn btn-save w-100 mt-3">Publish Event</button>
                        <div class="text-center mt-3">
                            <a href="{{ url_for('dashboard') }}" class="btn-cancel">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            flatpickr("#add-date-picker", {
                mode: "range",          // 👈 Membolehkan pilihan julat tarikh (banyak hari)
                dateFormat: "Y-m-d",    // Format hantar ke backend python: YYYY-MM-DD
                locale: {
                    firstDayOfWeek: 0   // Kalendar mula dari hari Ahad
                }
            });
        });
    </script>
</body>
</html>
