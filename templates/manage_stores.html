{% for store in stores %}

<div>
    <h3>{{ store.name }}</h3>

    <p>{{ store.description }}</p>

    <p>Owner: {{ store.owner.username }}</p>

    <h4>Products</h4>

    {% for product in store.products %}

        <div style="margin-left:20px;">

            {{ product.name }} - RM{{ product.price }}

            <form action="{{ url_for('delete_product', product_id=product.id) }}"
                  method="POST"
                  style="display:inline;">

                <button type="submit">
                    Delete Product
                </button>

            </form>

        </div>

    {% endfor %}

    <br>

    <form action="{{ url_for('delete_store', store_id=store.id) }}"
          method="POST">

        <button type="submit">
            Delete Store
        </button>

    </form>

</div>

<hr>

{% endfor %}
