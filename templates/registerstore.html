<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Store - MMU EXCHANGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body {
            background-color: #f8fafc; /* Slate 50 (Cerah, bersih & premium) */
            color: #0f172a; /* Slate 900 */
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            margin: 0;
        }

        /* Ambient Glow versi Light Mode menggunakan warna korporat MMU */
        .glow {
            position: fixed;
            top: -10%; left: 50%; transform: translateX(-50%);
            width: 1000px; height: 500px;
            background: radial-gradient(circle, rgba(0, 114, 206, 0.06) 0%, rgba(220, 53, 69, 0.03) 50%, rgba(248, 250, 252, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Kad Premium Cerah */
        .register-card {
            position: relative;
            z-index: 1;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 480px;
            margin: auto;
            box-shadow: 0 15px 35px rgba(0, 114, 206, 0.04);
            transition: all 0.3s ease;
        }

        /* Fokus pada mana-mana input akan menyerlahkan border kad */
        .register-card:focus-within {
            border-color: #cbd5e1;
            box-shadow: 0 20px 40px rgba(0, 114, 206, 0.06);
        }

        /* Jenama Gradien Khas MMU */
        .mmu-brand {
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #0072ce 0%, #dc3545 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            display: block;
        }

        .text-muted {
            color: #64748b !important; /* Slate 500 */
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-label {
            color: #475569 !important; /* Slate 600 */
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        /* Gaya Input & Textarea Premium */
        .form-control {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #0f172a !important;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        /* Fokus Input Cerah */
        .form-control:focus {
            border-color: #0072ce !important;
            box-shadow: 0 0 0 4px rgba(0, 114, 206, 0.12);
            outline: none;
        }

        .form-control::placeholder {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* Butang Solid Premium dengan Rona MMU */
        .btn-primary {
            background: linear-gradient(135deg, #0072ce 0%, #dc3545 100%) !important;
            color: #ffffff !important;
            font-weight: 600;
            border: none !important;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 114, 206, 0.15);
        }

        .btn-primary:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.2);
        }

        .link-back {
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .link-back:hover { 
            color: #0072ce; 
        }
    </style>
</head>
<body>
    <!-- Ambient Glow System (Biru & Merah MMU) -->
    <div class="glow"></div>

    <div class="register-card">
        <div class="text-center mb-4">
            <span class="mmu-brand">MMU EXCHANGE</span>
            <p class="text-muted mt-1">Setup your business profile</p>
        </div>
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Store Name</label>
                <input type="text" name="store_name" class="form-control" placeholder="What's your store called?" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Tell us what you are selling..." style="resize: none;"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number (WhatsApp)</label>
                <input type="text" name="phone_number" class="form-control" placeholder="E.g., 0123456789" required>
                <div class="mt-2" style="color: #64748b; font-size: 0.8rem; line-height: 1.4; font-weight: 500;">
                    Enter number without country code '60' (E.g., 0123456789).
                </div>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary">Create Store</button>
            </div>
        </form>
        
        <div class="text-center mt-4">
            <a href="{{ url_for('dashboard') }}" class="link-back">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
